name: Deploy Expansion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 209.50.254.85
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/apps/expansion

            git pull origin main

            docker compose down

            docker compose build --no-cache

            docker compose up -d

            docker image prune -f
